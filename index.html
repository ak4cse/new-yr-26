<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy New Year! ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%); color: white; font-family: 'Montserrat', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; transition: background 0.5s ease; }
        
        /* Starfield */
        .stars { width: 1px; height: 1px; background: transparent; animation: animStar 50s linear infinite; }
        .stars2 { width: 2px; height: 2px; background: transparent; animation: animStar 100s linear infinite; }
        .stars3 { width: 3px; height: 3px; background: transparent; animation: animStar 150s linear infinite; }
        
        @keyframes animStar { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }

        /* Shooting Star Animation */
        .shooting-star {
            position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 0 4px rgba(255,255,255,0.1), 0 0 0 8px rgba(255,255,255,0.1), 0 0 20px rgba(255,255,255,1);
            animation: shoot 3s linear infinite; opacity: 0; z-index: 5; pointer-events: none;
        }
        .shooting-star::before {
            content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 300px; height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }
        @keyframes shoot {
            0% { transform: rotate(315deg) translateX(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: rotate(315deg) translateX(-1000px); opacity: 0; }
        }

        /* The Content Box */
        .center-stage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 85%; max-width: 800px; z-index: 10;
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 5px; opacity: 0; 
            transition: opacity 1.1s ease-in-out, text-shadow 0.3s ease; 
            text-shadow: 0 0 20px rgba(255,255,255,0.5); 
        }
        h1:hover { text-shadow: 0 0 30px #ff6b6b, 0 0 60px #ff6b6b; cursor: help; }

        p { font-size: 1.1rem; line-height: 1.8; opacity: 0; transition: opacity 1s ease-in-out; color: #aab; margin-top: 20px; }

        /* Navigation Hint */
        .tap-hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 0.8rem; color: #555; animation: pulse 2s infinite; cursor: pointer; pointer-events: none;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }

        /* The Lucky Planet */
        .planet {
            position: absolute; top: 15%; right: 10%; width: 60px; height: 60px;
            background: linear-gradient(45deg, #6b6bff, #a502ff);
            border-radius: 50%; box-shadow: -5px -5px 20px rgba(0,0,0,0.5) inset, 0 0 20px rgba(107, 107, 255, 0.4);
            animation: float 6s ease-in-out infinite; cursor: pointer; opacity: 0.8; z-index: 20; transition: transform 0.2s;
        }
        .planet:active { transform: scale(0.9); }
        .planet::after { content: ''; position: absolute; width: 90px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; top: 50%; left: -15px; transform: rotate(-20deg); }
        
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0px); } }

        /* Music Control Button */
        .music-btn {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 10px 15px; border-radius: 30px; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            opacity: 0; transition: all 0.5s ease; pointer-events: none;
        }
        .music-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .visible { opacity: 1 !important; }
        .clickable { pointer-events: all !important; }

        /* Cursor Trail */
        .trail {
            position: absolute; width: 6px; height: 6px; background: rgba(255, 255, 255, 0.8);
            border-radius: 50%; pointer-events: none; animation: fadeTrail 1s linear forwards;
        }
        @keyframes fadeTrail { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        /* Heart Burst */
        .floating-heart {
            position: absolute; font-size: 20px; pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
        }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
        
        /* Disco Mode */
        .disco-mode { animation: discoBg 2s infinite; }
        @keyframes discoBg {
            0% { background: #1b2735; } 25% { background: #2c0e18; } 50% { background: #0e2c24; } 75% { background: #180e2c; } 100% { background: #1b2735; }
        }
            /* Developer Credit Signature */
.dev-credit {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 0.75rem; /* Small and subtle */
    color: rgba(255, 255, 255, 0.3); /* Faded out by default */
    text-decoration: none;
    z-index: 1000;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    cursor: pointer;
}

/* Glow effect on hover */
.dev-credit:hover {
    color: rgba(255, 255, 255, 1);
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px #ff6b6b;
    transform: translateY(-2px);
}

    </style>
</head>
<body onclick="handleBodyClick(event)">

    <audio id="bgMusic" loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <audio id="confettiSfx">
        <source src="confettti.mp3" type="audio/mpeg">
    </audio>

    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>
    
    <button id="musicToggle" class="music-btn" onclick="toggleMusic(event)">
        🎵 Music
    </button>

    <div class="planet" onclick="handlePlanetClick(event)"></div>

    <div class="center-stage">
        <h1 id="mainTitle">Hello.</h1>
        <p id="subText">Tap anywhere to start...</p>
    </div>
    <div class="dev-credit">
        Made with ✨ by Ak
    </div>



    <div class="tap-hint" id="hintText">( Tap screen to continue )</div>

    <script>
        // ==========================================
        // DYNAMIC NAME CONFIGURATION
        // ==========================================
        
        // 1. Grab the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Check if a name is in the link, otherwise use default
        // usage: yoursite.com/?name=Rahul
        const nameFromUrl = urlParams.get('name');
        
        // If name exists, use it. If not, use "There" (so it says "Hello, There.")
        const recipientName = nameFromUrl ? nameFromUrl : "There"; 
        
        // ==========================================


        // --- 1. Star Generation ---
        function createStars(className, count) {
            let shadow = "";
            for(let i = 0; i < count; i++) {
                let x = Math.floor(Math.random() * window.innerWidth);
                let y = Math.floor(Math.random() * 2000);
                shadow += `${x}px ${y}px #FFF, `;
            }
            shadow = shadow.slice(0, -2);
            document.querySelector(className).style.boxShadow = shadow;
        }
        createStars('.stars', 100); 
        createStars('.stars2', 40); 
        createStars('.stars3', 20); 

        // --- 2. Variables & Story ---
        let step = 0;
        let planetClicks = 0;
        let lastClickTime = 0;
        const title = document.getElementById('mainTitle');
        const sub = document.getElementById('subText');
        const hint = document.getElementById('hintText');
        const bgMusic = document.getElementById('bgMusic');
        const confettiSfx = document.getElementById('confettiSfx');
        const musicBtn = document.getElementById('musicToggle');
        
        bgMusic.volume = 0.5;
        confettiSfx.volume = 0.8;

        // Set initial title
        title.innerText = "Hello, " + recipientName + ".";

        // The Generic Story
        const story = [
            { t: "Look at the stars.", s: "Take a deep breath and pause for a moment." },
            { t: "Another year has passed.", s: "It had its ups, its downs, and its lessons." },
            { t: "But here you are.", s: "Standing strong, ready for what comes next." },
            { t: "2026 is a blank canvas.", s: "It's waiting for your dreams, your laughter, and your magic." }, 
            { t: "Believe in yourself.", s: "You have so much potential shining within you." },
            { t: "My wish for you?", s: "Health, happiness, and the courage to chase your stars." },
            { t: "You've got this.", s: "Make this year your masterpiece." },
            { t: "Happy New Year! ✨", s: "Wishing you the absolute best." },
            { t: "Cheers to 2026. 🥂", s: "(One last surprise... tap the planet!)" }
        ];

        // --- 3. Interaction Logic ---
        function handleBodyClick(event) {
            // Double Click Easter Egg
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastClickTime;
            
            if (tapLength < 300 && tapLength > 0) {
                spawnHearts(event.clientX, event.clientY);
                event.stopPropagation();
            } else {
                nextChapter();
            }
            lastClickTime = currentTime;
        }

        function nextChapter() {
            if(step === 0) {
                hint.style.display = 'none';
                bgMusic.play().catch(e => console.log("Audio requires interaction"));
                musicBtn.classList.add('visible');
                musicBtn.classList.add('clickable');
            }

            if (step >= story.length) {
                triggerConfetti();
                return; 
            }

            title.classList.remove('visible');
            sub.classList.remove('visible');

            setTimeout(() => {
                title.innerText = story[step].t;
                sub.innerText = story[step].s;
                
                title.classList.add('visible');
                sub.classList.add('visible');
                
                if(step === story.length - 2) {
                    triggerFinale();
                }
                step++;
            }, 1000);
        }

        function toggleMusic(e) {
            e.stopPropagation(); 
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.innerText = "🎵 Music: ON";
            } else {
                bgMusic.pause();
                musicBtn.innerText = "🔇 Music: OFF";
            }
        }

        // --- 4. Easter Eggs ---

        // A. Lucky Planet (Generic version)
        function handlePlanetClick(e) {
            e.stopPropagation();
            planetClicks++;
            
            let msg = "";
            if(planetClicks === 1) msg = "🪐 You found the Lucky Planet! \nYour luck for 2026 just increased by 100%.";
            else if(planetClicks === 2) msg = "Keep tapping for more good vibes!";
            else if(planetClicks === 3) msg = "Okay, save some luck for the rest of us!";
            else {
                msg = "BOOM! 💥 \nExplosion of happiness! Happy New Year!";
                triggerConfetti();
            }
            alert(msg);
        }

        // B. Cursor Trail
        document.addEventListener('mousemove', function(e) {
            createTrail(e.clientX, e.clientY);
        });
        document.addEventListener('touchmove', function(e) {
            createTrail(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => { trail.remove(); }, 1000);
        }

        // C. Shooting Stars
        function spawnShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = Math.random() * window.innerHeight + 'px';
            star.style.left = Math.random() * window.innerWidth + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 3000);
        }
        setInterval(spawnShootingStar, 4000);

        // D. Love Burst
        function spawnHearts(x, y) {
            for (let i = 0; i < 5; i++) {
                const heart = document.createElement('div');
                heart.innerText = ['❤️', '✨', '🥂', '🎉'][Math.floor(Math.random() * 4)];
                heart.className = 'floating-heart';
                heart.style.left = x + (Math.random() * 40 - 20) + 'px';
                heart.style.top = y + 'px';
                heart.style.animationDuration = (1 + Math.random()) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }
        }

        // E. Secret Code "2026"
        let keySequence = [];
        document.addEventListener('keydown', (e) => {
            keySequence.push(e.key.toLowerCase());
            if (keySequence.length > 4) keySequence.shift();
            
            if (keySequence.join('') === '2026') {
                document.body.classList.add('disco-mode');
                triggerConfetti();
                alert("✨ PARTY MODE ACTIVATED! ✨");
                setTimeout(() => document.body.classList.remove('disco-mode'), 5000);
            }
        });

        // --- 5. Visual Effects ---
        function triggerConfetti() {
            confettiSfx.currentTime = 0; 
            confettiSfx.play().catch(e => {}); // Catch error if no audio interaction yet
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function triggerFinale() {
            confettiSfx.play().catch(e => {});
            let duration = 3000;
            let end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        console.log("%c Happy New Year! ✨", "color: #ff6b6b; font-size: 20px; font-weight: bold;");

        // Initial Fade In
        setTimeout(() => {
            title.classList.add('visible');
            sub.classList.add('visible');
        }, 500);
    </script>
</body>
</html>
